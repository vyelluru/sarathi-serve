output_dir: "experiments/results/aimd_steady"

scheduler_config:
  type: "SARATHI"
  chunk_size: 512
  max_num_seqs: 64
  controller_type: "AIMD"

request_generator_config:
  type: "SYNTHETIC"
  num_requests: 500
  length_generator_config:
    type: "TRACE"
    trace_file: "traces/steady_trace.csv"
    max_tokens: 2048
  interval_generator_config:
    type: "POISSON"
    qps: 2.0
